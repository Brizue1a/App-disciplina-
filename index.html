<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Racha Pro</title>
</head>

<body style="font-family: Arial; text-align:center; background:#111; color:white;">

<h1>🎮 Racha Pro</h1>

<p>💵 Efectivo: ₡<span id="efectivo">0</span></p>
<p>🏦 Ahorro: ₡<span id="ahorro">0</span></p>
<p>⭐ XP: <span id="xp">0</span></p>
<p>🔥 Racha: <span id="racha">0</span> días</p>
<p>🆙 Nivel: <span id="nivel">1</span></p>
<p>❤️ Vidas: <span id="vidas">2</span></p>

<h2 id="estado">Listo para jugar</h2>

<hr>

<button onclick="iniciarTrabajo()">⏱️ Trabajar</button>
<button onclick="guardarDinero()">🏦 Guardar</button>
<button onclick="gasto()">💸 Gasto</button>

<button onclick="pelear()">⚔️ Defender</button>
<button onclick="ignorar()">😴 Ignorar</button>

<hr>

<h3>📜 Gastos</h3>
<ul id="lista"></ul>

<script>

let data = JSON.parse(localStorage.getItem("data")) || {
  efectivo: 0,
  ahorro: 0,
  xp: 0,
  nivel: 1,
  vidas: 2,
  racha: 0,
  ultimoDia: null,
  ultimoMonstruo: Date.now(),
  gastos: []
};

let trabajando = false;
let inicioTrabajo = 0;
let monstruo = null;

function guardar() {
  localStorage.setItem("data", JSON.stringify(data));
}

function nivelCalc() {
  if (data.xp > 10000) data.nivel = 5;
  else if (data.xp > 5000) data.nivel = 4;
  else if (data.xp > 2000) data.nivel = 3;
  else if (data.xp > 500) data.nivel = 2;
  else data.nivel = 1;
}

function iniciarTrabajo() {
  if (trabajando) {
    let tiempo = Math.floor((Date.now() - inicioTrabajo) / 60000);
    let ganancia = tiempo * 200;

    data.efectivo += ganancia;
    data.xp += ganancia;

    actualizarRacha();

    trabajando = false;

    document.getElementById("estado").innerText =
      "💼 Trabajaste " + tiempo + " min (+₡" + ganancia + ")";
  } else {
    trabajando = true;
    inicioTrabajo = Date.now();

    document.getElementById("estado").innerText =
      "⏳ Trabajando...";
  }

  nivelCalc();
  guardar();
  actualizar();
}

function actualizarRacha() {
  let hoy = new Date().toDateString();

  if (data.ultimoDia !== hoy) {
    data.racha++;
    data.ultimoDia = hoy;
  }
}

function guardarDinero() {
  let m = prompt("¿Cuánto guardar?");
  if (!m) return;

  m = parseInt(m) || 0;

  if (m > data.efectivo) return alert("No alcanza");

  data.efectivo -= m;
  data.ahorro += m;

  guardar();
  actualizar();
}

function gasto() {
  let nombre = prompt("¿En qué?");
  let m = prompt("¿Cuánto?");

  if (!nombre || !m) return;

  m = parseInt(m) || 0;

  data.efectivo -= m;
  if (data.efectivo < 0) data.efectivo = 0;

  data.gastos.push({nombre, m});

  guardar();
  actualizar();
}

function generarMonstruo() {
  let ahora = Date.now();
  let horas = (ahora - data.ultimoMonstruo) / (1000 * 60 * 60);

  if (horas > 6 && !monstruo) {
    let daño = Math.floor(Math.random() * 5000) + 2000;

    monstruo = { daño };
    data.ultimoMonstruo = ahora;

    document.getElementById("estado").innerText =
      "👾 Monstruo quiere ₡" + daño;
  }
}

function pelear() {
  if (!monstruo) return alert("No hay monstruo");

  let decision = confirm("¿Trabajar para defender?");
  if (!decision) return;

  iniciarTrabajo();

  monstruo = null;

  document.getElementById("estado").innerText =
    "🏆 Defendiste tu dinero";
}

function ignorar() {
  if (!monstruo) return;

  data.efectivo -= monstruo.daño;
  if (data.efectivo < 0) data.efectivo = 0;

  data.vidas--;

  if (data.vidas <= 0) {
    data.vidas = 2;
    data.racha = 0;
    alert("💀 Perdiste el control");
  }

  monstruo = null;

  guardar();
  actualizar();

  document.getElementById("estado").innerText =
    "💀 Perdiste dinero";
}

function actualizar() {
  document.getElementById("efectivo").innerText = data.efectivo;
  document.getElementById("ahorro").innerText = data.ahorro;
  document.getElementById("xp").innerText = data.xp;
  document.getElementById("nivel").innerText = data.nivel;
  document.getElementById("vidas").innerText = data.vidas;
  document.getElementById("racha").innerText = data.racha;

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.gastos.forEach(g => {
    let li = document.createElement("li");
    li.textContent = g.nombre + " ₡" + g.m;
    lista.appendChild(li);
  });
}

setInterval(generarMonstruo, 60000);

actualizar();

</script>

</body>
</html>
